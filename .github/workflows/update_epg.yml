name: Update Freeview EPG
on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at Midnight
  workflow_dispatch:

jobs:
  # STEP 1: Freeview Seed
  seed_freeview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests

      - name: Run Freeview Seed (North West)
        run: python epg_script.py North_West

      - name: Commit Seed Cache
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Seed Freeview Cache" || exit 0
          git push

  # STEP 2: Freeview Sequential Matrix
  matrix_freeview:
    needs: seed_freeview
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        region: [London, East_Midlands, West_Midlands, North_East, Yorkshire, East_Yorkshire, East_Anglia, South, South_East, South_West, West, Scotland, Wales, Northern_Ireland, Channel_Islands, Border]
      fail-fast: false
    
    steps:
      - uses: actions/checkout@v4
      - run: git pull --rebase
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests

      - name: Run Freeview Scraper
        run: python epg_script.py ${{ matrix.region }}

      - name: Commit Regional XML
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update Freeview: ${{ matrix.region }}" || exit 0
          git pull --rebase
          git push
