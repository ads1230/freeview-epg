name: Daily Freeview EPG Update

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests tqdm

      - name: Run Freeview Script
        env:
          # This maps your GitHub Secret (EPG_TOKEN) to the script
          EPG_TOKEN_ENV: ${{ secrets.EPG_TOKEN }}
        run: python epg_script.py

      - name: Commit and Push
        run: |
          git config --global user.name "EPG-Bot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "Update Guide and Logos - $(date)" || exit 0
        
          # Use the token to authenticate the push explicitly
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:main
